# Snippet for self-hosted OpenRouter Studio behind nginx.
# 502 Bad Gateway on /api/openrouter/* is usually:
#   1) proxy_read_timeout too low (image gen can take 1–3+ minutes)
#   2) client_max_body_size too low (reference images as base64 make large JSON bodies)
#
# Merge into your server { } or location / { } for this site, then: nginx -t && reload nginx

client_max_body_size 50m;

proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# Allow OpenRouter image/video APIs to run longer than nginx defaults (often 60s)
proxy_connect_timeout 300s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;

# Optional: if you still see 502 on huge uploads, try:
# proxy_request_buffering off;

# -----------------------------------------------------------------------------
# Nginx Proxy Manager (NPM)
# -----------------------------------------------------------------------------
# 1. Open NPM → Hosts → Proxy Hosts → edit your OpenRouter Studio host.
# 2. Tab "Advanced" → "Custom Nginx Configuration" (injected into the server block).
# 3. Paste ONLY the block below (NPM already sets proxy_pass and most proxy_* headers;
#    duplicating proxy_set_header here can cause confusion — timeouts + body size are enough).
#
# client_max_body_size 50m;
# proxy_connect_timeout 300s;
# proxy_send_timeout 300s;
# proxy_read_timeout 300s;
#
# 4. Save → NPM reloads nginx automatically.
#
# If 502 persists only on huge uploads, add in the same box:
#   proxy_request_buffering off;
