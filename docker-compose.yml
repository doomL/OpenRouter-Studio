services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openrouter_studio
      POSTGRES_USER: studio
      # Override in `.env` with a strong password: POSTGRES_PASSWORD=your_secret
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studio_secret}
    volumes:
      # Postgres data survives image rebuilds and container recreation.
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d openrouter_studio"]
      interval: 10s
      timeout: 5s
      retries: 5

  openrouter-studio:
    build: .
    ports:
      # Host port → container :3000 (override with APP_PORT in `.env`)
      - "${APP_PORT:-3080}:3000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # Always listen on :3000 inside the container. `ports` maps host APP_PORT → 3000.
      PORT: "3000"
      # Use request Host / X-Forwarded-* for Auth.js URL building (sign-out redirect, etc.)
      AUTH_TRUST_HOST: "true"
      # PostgreSQL connection via the `postgres` service above.
      # Override POSTGRES_PASSWORD in `.env` to use a custom password.
      DATABASE_URL: "postgresql://studio:${POSTGRES_PASSWORD:-studio_secret}@postgres:5432/openrouter_studio"
      # Limit Node.js heap to prevent OOM crashes. Raise if you have more RAM available.
      NODE_OPTIONS: "--max-old-space-size=768"

volumes:
  postgres-data:
