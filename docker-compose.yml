services:
  openrouter-studio:
    build: .
    ports:
      # Host port → container :3000 (override with APP_PORT in `.env`)
      - "${APP_PORT:-3080}:3000"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      # Always listen on :3000 inside the container. `ports` maps host APP_PORT → 3000.
      # (`.env` often sets PORT=3080 for local dev; that would break the 3080:3000 mapping.)
      PORT: "3000"
      # Use request Host / X-Forwarded-* for Auth.js URL building (sign-out redirect, etc.)
      AUTH_TRUST_HOST: "true"
      # Do NOT default NEXTAUTH_URL to localhost here — that forces sign-out (and other redirects)
      # to localhost on a public host. Omit NEXTAUTH_URL and rely on AUTH_TRUST_HOST, or set
      # NEXTAUTH_URL in `.env` to your real public origin (https://your.domain).
